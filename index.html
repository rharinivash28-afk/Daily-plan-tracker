<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#534AB7" />
    <meta name="description" content="Habitflow — build better days, one habit at a time." />

    <!-- Purple sparkle SVG favicon -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23534AB7'%3E%3Cpath d='M12 2l1.9 5.8L20 9.7l-5.1 3.7L17 19l-5-3.7L7 19l2.1-5.6L4 9.7l6.1-1.9z'/%3E%3C/svg%3E" />

    <!-- Inter via Google Fonts — loaded non-render-blocking (swaps in once ready) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      media="print" onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    </noscript>

    <!-- Critical inline styles + a static snapshot of the welcome screen so
         the real LCP content (heading + subtitle) paints before JS runs.
         React replaces #root on mount (instant for returning users). -->
    <style>
      html, body { margin: 0; height: 100%; background: #EEF0F7; color: #1A1A1A;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased; }
      html.dark, html.dark body { background: #0C0C12; color: #F5F5F5; }
      #shell { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
      #shell .w { width: 100%; max-width: 28rem; text-align: center; }
      #shell .dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 32px; }
      #shell .dots i { height: 6px; border-radius: 999px; background: rgba(83,74,183,0.25); width: 6px; display: inline-block; }
      #shell .dots i.on { width: 32px; background: #534AB7; }
      #shell .badge { width: 80px; height: 80px; border-radius: 999px; margin: 0 auto 24px;
        display: grid; place-items: center; background: #EEEDFE; }
      html.dark #shell .badge { background: rgba(83,74,183,0.25); }
      #shell .badge svg { color: #534AB7; }
      #shell h1 { font-size: 24px; font-weight: 700; margin: 0; }
      #shell .sub { color: #6B7280; font-size: 16px; margin-top: 8px; line-height: 1.5; }
      #shell .field { margin-top: 28px; text-align: left; }
      #shell .label { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
      #shell .input { width: 100%; box-sizing: border-box; padding: 12px 16px; border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.6); }
      html.dark #shell .input { background: rgba(32,32,46,0.55); border-color: rgba(255,255,255,0.1); }
      #shell .btn { width: 100%; box-sizing: border-box; margin-top: 24px; padding: 14px; border-radius: 12px;
        background: #534AB7; color: #fff; font-weight: 600; border: 0; font-size: 16px; }
    </style>

    <!-- Apply saved/system theme before paint (no flash) -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("habitflow_data");
          var dark = false;
          if (raw) { var d = JSON.parse(raw); dark = d && d.user && d.user.darkMode; }
          else { dark = window.matchMedia("(prefers-color-scheme: dark)").matches; }
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <title>Habitflow — Build better days</title>
  </head>
  <body>
    <div id="root">
      <main id="shell">
        <div class="w">
          <div class="badge">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.9 5.8L20 9.7l-5.1 3.7L17 19l-5-3.7L7 19l2.1-5.6L4 9.7l6.1-1.9z"/></svg>
          </div>
          <h1>Welcome back</h1>
          <p class="sub">Sign in to pick up where you left off.</p>
          <div class="field">
            <div class="input">you@example.com</div>
          </div>
          <div class="field" style="margin-top:12px">
            <div class="input">Password</div>
          </div>
          <div class="btn">Sign in →</div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
